name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `rove` in directory ...
        2. Press ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS:
        - Node version:
        - rove version:
    validations:
      required: true
